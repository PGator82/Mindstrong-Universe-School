server {
    listen $PORT;
    charset utf-8;

    root /app;

    # Redirects
    location = /     { return 301 /home.html; }
    location = /home { return 301 /home.html; }
    location = /login { return 301 /login.html; }

    # HTML, JS, JSON — never cache
    location ~* \.(html|js|json)$ {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Images, fonts, CSS — cache 7 days
    location ~* \.(css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map|webp)$ {
        try_files $uri =404;
        expires 7d;
    }

    # Block sensitive files
    location ~* \.(sql|log|env|htpasswd)$ { return 403; }
    location ~ ^/(application|system)/ { return 403; }

    # All dynamic requests → CodeIgniter (School/index.php)
    location / {
        try_files $uri /index.php?$request_uri;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /app/index.php;
        fastcgi_param DOCUMENT_ROOT   /app;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
