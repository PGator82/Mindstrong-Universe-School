server {
    listen $PORT;
    root /app;
    index index.php index.html;
    charset utf-8;

    # / and /home → home.html
    location = / {
        return 301 /home.html;
    }
    location = /home {
        return 301 /home.html;
    }

    # /login → login.html (never hit the PHP Login controller)
    location = /login {
        return 301 /login.html;
    }

    # Serve static HTML files directly
    location ~* ^/(home|login|dashboard|teacher|admin|parent|school|superadmin|solution)\.html$ {
        try_files $uri =404;
    }

    # Serve static assets directly
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 7d;
    }

    # Block direct access to sensitive directories
    location ~ ^/(application|system|School) {
        return 403;
    }

    # Block SQL and sensitive files
    location ~* \.(sql|log|env|htpasswd)$ {
        return 403;
    }

    # Route everything else through CodeIgniter
    location / {
        try_files $uri $uri/ /index.php?/$request_uri;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
