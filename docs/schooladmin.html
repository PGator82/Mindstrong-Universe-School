<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Admin Login — MindStrong</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#05050f;color:#f0f0ff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{background:#0f0f2a;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:44px;width:380px;}
.logo{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
h2{font-size:1.4rem;font-weight:900;margin-bottom:6px;}
p{color:#888aaa;font-size:.85rem;margin-bottom:28px;}
label{display:block;font-size:.72rem;font-weight:700;color:#888aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#f0f0ff;font-size:.9rem;outline:none;margin-bottom:16px;}
input:focus{border-color:#f59e0b;}
button{width:100%;padding:12px;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:10px;color:#fff;font-weight:800;font-size:.95rem;cursor:pointer;}
button:hover{opacity:.9;}
.err{color:#ef4444;font-size:.8rem;margin-bottom:12px;display:none;}
.back{display:block;text-align:center;margin-top:18px;font-size:.8rem;color:#888aaa;text-decoration:none;}
.back:hover{color:#f0f0ff;}
.info{margin-top:20px;padding:12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;font-size:.78rem;color:#fbbf24;line-height:1.6;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">MindStrong Universe</div>
  <h2>School Admin Login</h2>
  <p>Direct access to the MySchool management backend</p>
  <div class="err" id="err">Incorrect credentials. Try again.</div>
  <form id="frm">
    <label>Email</label>
    <input type="email" id="email" placeholder="admin@email.com" required>
    <label>Password</label>
    <input type="password" id="pass" placeholder="Password" required>
    <button type="submit" id="btn">Login to School Admin →</button>
  </form>
  <div class="info">
    This logs you directly into MySchool's original admin backend.<br>
    Use your <strong>Administrator</strong> account credentials.
  </div>
  <a href="/login.html" class="back">← Back to main login</a>
</div>
<script>
document.getElementById('frm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  btn.textContent = 'Logging in…'; btn.disabled = true;

  const fd = new FormData();
  fd.append('email', email);
  fd.append('password', pass);

  try {
    const r = await fetch('/login/validate_login', {
      method: 'POST', body: fd, credentials: 'include',
      redirect: 'manual'
    });
    // validate_login does a server redirect — follow it
    if (r.status === 0 || r.type === 'opaqueredirect' || r.ok) {
      window.location.href = '/admin/student_information';
    } else {
      document.getElementById('err').style.display = 'block';
      btn.textContent = 'Login to School Admin →'; btn.disabled = false;
    }
  } catch(e) {
    // Try direct form submit if fetch fails
    const form = document.createElement('form');
    form.method = 'POST'; form.action = '/login/validate_login';
    [['email',email],['password',pass]].forEach(([n,v])=>{
      const i = document.createElement('input');
      i.type='hidden'; i.name=n; i.value=v; form.appendChild(i);
    });
    document.body.appendChild(form);
    form.submit();
  }
});
</script>
</body>
</html>
