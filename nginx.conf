server {
    listen $PORT;
    charset utf-8;

    # Static HTML/CSS/JS/assets served from School/public_html
    root /app/School/public_html;

    # Redirects
    location = /     { return 301 /home.html; }
    location = /home { return 301 /home.html; }
    location = /login { return 301 /login.html; }

    # Serve static files directly
    location ~* \.(html|css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map|webp)$ {
        try_files $uri =404;
        expires 7d;
    }

    # Block sensitive files
    location ~* \.(sql|log|env|htpasswd)$ { return 403; }
    location ~ ^/(application|system)/ { return 403; }

    # All dynamic requests → CodeIgniter (School/index.php)
    location / {
        try_files $uri /index.php?$request_uri;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /app/School/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/School;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
